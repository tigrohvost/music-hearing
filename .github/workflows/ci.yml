name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
        extras: ["test", "test,rich"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[${{ matrix.extras }}]" pyflakes
      - name: Lint (pyflakes)
        run: python -m pyflakes music_hearing tests
      - name: Test
        run: python -m pytest tests/ -q
